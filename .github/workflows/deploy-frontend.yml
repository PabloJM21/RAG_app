name: Build and Deploy NextJS Frontend

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io
  IMAGE_NAME: nextjs_frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./nextjs-frontend
          file: ./nextjs-frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set ACR credentials on frontend App Service
        run: |
          az webapp config container set \
            --name rag-app-frontend \
            --resource-group rag-app-rg-gwc \
            --container-image-name pabloragacr.azurecr.io/nextjs_frontend:latest \
            --container-registry-url https://pabloragacr.azurecr.io \
            --container-registry-user ${{ secrets.AZURE_REGISTRY_USERNAME }} \
            --container-registry-password ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Deploy to Azure App Service (Container)
        uses: azure/webapps-deploy@v2
        with:
          app-name: rag-app-frontend
          slot-name: Production
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Restart frontend App Service
        run: |
          az webapp restart \
            --name rag-app-frontend \
            --resource-group rag-app-rg-gwc